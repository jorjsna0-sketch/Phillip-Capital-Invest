<!doctype html>
<html lang="tr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
        
        <!-- PWA Meta Tags -->
        <meta name="theme-color" content="#0B1E3F" />
        <meta name="background-color" content="#0B1E3F" />
        <meta name="description" content="Phillip Capital Invest - Özel yatırım çözümleri ve premium varlık yönetimi." />
        <meta name="application-name" content="Phillip Capital Invest" />
        <meta name="keywords" content="yatırım, investment, премиум, портфель, Phillip Capital Invest" />
        
        <!-- Open Graph / Facebook -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://phillipcapitalinvest.com/" />
        <meta property="og:title" content="Phillip Capital Invest — Premium Wealth Management" />
        <meta property="og:description" content="Özel yatırım çözümleri ve premium varlık yönetimi. Profesyonel portföy yönetimi." />
        <meta property="og:image" content="/icons/og-image.png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:site_name" content="Phillip Capital Invest" />
        <meta property="og:locale" content="tr_TR" />
        
        <!-- Twitter -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:url" content="https://phillipcapitalinvest.com/" />
        <meta name="twitter:title" content="Phillip Capital Invest — Premium Wealth Management" />
        <meta name="twitter:description" content="Özel yatırım çözümleri ve premium varlık yönetimi." />
        <meta name="twitter:image" content="/icons/og-image.png" />
        
        <!-- iOS Meta Tags -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Phillip Capital Invest" />
        <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
        
        <!-- iOS Splash Screens -->
        <meta name="apple-touch-fullscreen" content="yes" />
        
        <!-- Android/Chrome -->
        <meta name="mobile-web-app-capable" content="yes" />
        
        <!-- Prevent phone number detection -->
        <meta name="format-detection" content="telephone=no" />
        
        <!-- PWA Manifest -->
        <link rel="manifest" href="/manifest.json" />
        
        <!-- Favicon -->
        <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72x72.png" />
        
        <title>Phillip Capital Invest — Premium Wealth Management</title>
        
        <!-- Preconnect to API -->
        <link rel="preconnect" href="https://portfix.preview.emergentagent.com" />
        
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
        
        <script>
            if (window.self !== window.top) {
                var debugMonitorScript = document.createElement('script');
                debugMonitorScript.src = 'https://assets.emergent.sh/scripts/debug-monitor.js';
                document.head.appendChild(debugMonitorScript);
                window.tailwind = window.tailwind || {};
                tailwind.config = { corePlugins: { preflight: false } };
                var tailwindScript = document.createElement('script');
                tailwindScript.src = 'https://cdn.tailwindcss.com';
                document.head.appendChild(tailwindScript);
            }
        </script>
        
        <!-- Mobile-specific styles -->
        <style>
            /* Prevent pull-to-refresh on iOS */
            html, body {
                overscroll-behavior-y: contain;
            }
            
            /* Safe area insets for notched devices - only horizontal */
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
            
            /* Smooth scrolling */
            html {
                scroll-behavior: smooth;
                -webkit-overflow-scrolling: touch;
            }
            
            /* Prevent text selection on touch */
            .no-select {
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                user-select: none;
            }
            
            /* Touch action optimization */
            .touch-pan-y {
                touch-action: pan-y;
            }
            
            /* Hide scrollbar on mobile but keep functionality */
            .hide-scrollbar {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .hide-scrollbar::-webkit-scrollbar {
                display: none;
            }
            
            /* PWA Install Banner styles */
            #pwa-install-banner {
                position: fixed;
                bottom: 80px;
                left: 16px;
                right: 16px;
                background: linear-gradient(135deg, #0B1E3F 0%, #142E5F 100%);
                color: white;
                padding: 16px;
                border-radius: 16px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.3);
                z-index: 9998;
                display: none;
            }
            
            /* Splash screen */
            #splash-screen {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: linear-gradient(135deg, #0B1E3F 0%, #142E5F 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 99999;
                transition: opacity 0.3s ease-out;
            }
            
            #splash-screen.hidden {
                opacity: 0;
                pointer-events: none;
            }
            
            #splash-screen img {
                width: 120px;
                height: 120px;
                animation: pulse 2s ease-in-out infinite;
            }
            
            @keyframes pulse {
                0%, 100% { transform: scale(1); opacity: 1; }
                50% { transform: scale(1.05); opacity: 0.8; }
            }
        </style>
    </head>
    <body>
        <!-- Splash Screen -->
        <div id="splash-screen">
            <img src="/icons/icon-192x192.png" alt="Phillip Capital Invest" />
            <p style="color: white; margin-top: 24px; font-family: system-ui, sans-serif; font-size: 14px; opacity: 0.8;">Yükleniyor...</p>
        </div>
        
        <noscript>Bu uygulamanın çalışması için JavaScript gereklidir / Для работы приложения необходим JavaScript</noscript>
        <div id="root"></div>
        
        <!-- PWA Install Banner -->
        <div id="pwa-install-banner">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="/icons/icon-72x72.png" alt="" style="width: 48px; height: 48px; border-radius: 12px;" />
                <div style="flex: 1;">
                    <p style="font-weight: 600; margin: 0;">Phillip Capital Invest Uygulamasını Yükle</p>
                    <p style="font-size: 12px; opacity: 0.8; margin: 4px 0 0 0;">Ana ekrana hızlı erişim</p>
                </div>
                <button id="pwa-install-btn" style="background: white; color: #0B1E3F; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;">
                    Yükle
                </button>
            </div>
            <button id="pwa-install-close" style="position: absolute; top: 8px; right: 8px; background: none; border: none; color: white; opacity: 0.6; cursor: pointer; font-size: 18px;">✕</button>
        </div>

        <!-- Service Worker Registration -->
        <script>
            // Hide splash screen when app is ready
            window.addEventListener('load', function() {
                setTimeout(function() {
                    var splash = document.getElementById('splash-screen');
                    if (splash) {
                        splash.classList.add('hidden');
                        setTimeout(function() { splash.remove(); }, 300);
                    }
                }, 500);
            });
            
            // Register Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    navigator.serviceWorker.register('/service-worker.js')
                        .then(function(registration) {
                            console.log('SW registered:', registration.scope);
                        })
                        .catch(function(error) {
                            console.log('SW registration failed:', error);
                        });
                });
            }
            
            // PWA Install Prompt
            let deferredPrompt;
            const installBanner = document.getElementById('pwa-install-banner');
            const installBtn = document.getElementById('pwa-install-btn');
            const installClose = document.getElementById('pwa-install-close');
            
            window.addEventListener('beforeinstallprompt', function(e) {
                e.preventDefault();
                deferredPrompt = e;
                
                // Show install banner on mobile only
                if (window.innerWidth <= 768 && !window.matchMedia('(display-mode: standalone)').matches) {
                    setTimeout(function() {
                        installBanner.style.display = 'block';
                    }, 3000);
                }
            });
            
            if (installBtn) {
                installBtn.addEventListener('click', async function() {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        console.log('Install outcome:', outcome);
                        deferredPrompt = null;
                        installBanner.style.display = 'none';
                    }
                });
            }
            
            if (installClose) {
                installClose.addEventListener('click', function() {
                    installBanner.style.display = 'none';
                    localStorage.setItem('pwa-install-dismissed', Date.now());
                });
            }
            
            // Check if already installed
            window.addEventListener('appinstalled', function() {
                console.log('App installed');
                installBanner.style.display = 'none';
            });
        </script>

        <!-- Emergent debug script for iframe mode -->
        <script>
            // Hide any emergent badges on mobile
            if (window.innerWidth <= 768) {
                document.addEventListener('DOMContentLoaded', function() {
                    var badge = document.getElementById('emergent-badge');
                    if (badge) badge.style.display = 'none';
                });
            }
        </script>
    </body>
</html>
